<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0e15;
      --surface:   #12151f;
      --surface2:  #181c2a;
      --card:      #1a1e2e;
      --border:    #21273d;
      --border2:   #2c3350;
      --accent:    #5b8cf5;
      --accent-hv: #7aa3ff;
      --accent-dim: rgba(91,140,245,0.12);
      --text:      #dde3f0;
      --text2:     #a8b3cc;
      --muted:     #505870;
      --success:   #34d399;
      --error:     #f87171;
      --warn:      #fbbf24;

      --radius:    8px;
      --radius-sm: 5px;
    }

    html { scrollbar-color: var(--border2) var(--bg); scrollbar-width: thin; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Subtle dot grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* Everything above the background */
    header, #queue, main, #toast { position: relative; z-index: 1; }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 68px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      background: rgba(18, 21, 31, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }

    /* ── Logo ──────────────────────────────────────────────────────────── */
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 12px rgba(91,140,245,0.4);
    }

    .logo-icon svg { display: block; }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .logo-text span { color: var(--accent); }

    /* ── URL form ────────────────────────────────────────────────────────── */
    .url-form {
      flex: 1;
      display: flex;
      max-width: 680px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 4px 4px 20px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .url-form:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,140,245,0.15);
    }

    .url-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: inherit;
      font-size: 0.875rem;
      outline: none;
      min-width: 0;
    }

    .url-input::placeholder { color: var(--muted); }

    .url-btn {
      height: 36px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    .url-btn:hover  { background: var(--accent-hv); }
    .url-btn:active { transform: scale(0.97); }
    .url-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── Queue strip ─────────────────────────────────────────────────────── */
    #queue {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: none;
      flex-direction: column;
    }

    #queue.visible { display: flex; }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 28px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .queue-item:last-child { border-bottom: none; }
    .queue-item:hover { background: rgba(255,255,255,0.02); }

    .queue-status-bar {
      width: 3px;
      height: 36px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .queue-item[data-status="pending"]  .queue-status-bar { background: var(--muted); }
    .queue-item[data-status="running"]  .queue-status-bar { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .queue-item[data-status="complete"] .queue-status-bar { background: var(--success); }
    .queue-item[data-status="error"]    .queue-status-bar { background: var(--error); }

    .queue-meta { flex: 1; min-width: 0; }

    .queue-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .queue-url {
      font-size: 0.72rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .status-pill.pending  { background: rgba(80,88,112,0.25);  color: var(--text2); }
    .status-pill.running  { background: var(--accent-dim);      color: var(--accent); }
    .status-pill.complete { background: rgba(52,211,153,0.12);  color: var(--success); }
    .status-pill.error    { background: rgba(248,113,113,0.12); color: var(--error); }

    .spinner {
      width: 11px; height: 11px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .dismiss-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      width: 26px;
      height: 26px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.12s, background 0.12s;
    }

    .dismiss-btn:hover { color: var(--text); background: var(--border); }

    /* ── Main ────────────────────────────────────────────────────────────── */
    main { padding: 32px 28px; flex: 1; }

    /* ── Library toolbar ─────────────────────────────────────────────────── */
    .library-toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .section-heading {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      flex-shrink: 0;
    }

    .comic-count {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 999px;
    }

    .filter-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .filter-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }

    .filter-input {
      height: 32px;
      padding: 0 12px 0 32px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      outline: none;
      width: 200px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .filter-input::placeholder { color: var(--muted); }

    .filter-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,140,245,0.12);
    }

    /* Clear button inside filter */
    .filter-input::-webkit-search-cancel-button { display: none; }

    .sort-group {
      display: flex;
      gap: 3px;
      margin-left: auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 3px;
    }

    .sort-btn {
      height: 26px;
      padding: 0 10px;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.12s, background 0.12s;
      white-space: nowrap;
    }

    .sort-btn:hover  { color: var(--text2); }
    .sort-btn.active { background: var(--border2); color: var(--text); }

    /* ── Comics grid ─────────────────────────────────────────────────────── */
    #comics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 150px);
      gap: 20px;
    }

    /* ── Comic card — full-bleed poster style ────────────────────────────── */
    .comic-card {
      width: 150px;
      height: 300px;
      border-radius: var(--radius);
      overflow: hidden;
      display: block;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid var(--border);
      background: var(--card);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .comic-card:hover {
      transform: translateY(-4px) scale(1.03);
      box-shadow: 0 16px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(91,140,245,0.3);
      border-color: rgba(91,140,245,0.4);
    }

    .comic-cover {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    /* Persistent gradient for title legibility */
    .comic-card::before {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 55%;
      background: linear-gradient(to top, rgba(8,10,18,0.95) 0%, rgba(8,10,18,0.5) 50%, transparent 100%);
      z-index: 1;
      transition: opacity 0.2s;
    }

    /* Download overlay on hover */
    .comic-download-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      background: rgba(91, 140, 245, 0.72);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 3;
    }

    .comic-card:hover .comic-download-overlay { opacity: 1; }

    .comic-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #1a2040 0%, #0d1020 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .comic-cover-placeholder svg { opacity: 0.2; }

    .comic-cover-placeholder .placeholder-initials {
      font-size: 3.5rem;
      font-weight: 800;
      color: rgba(255,255,255,0.18);
      line-height: 1;
      letter-spacing: -0.02em;
      user-select: none;
    }

    .comic-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 10px 10px 10px;
      z-index: 2;
    }

    .comic-title {
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.35;
      color: #fff;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    #pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 36px;
      padding-bottom: 36px;
      flex-wrap: wrap;
    }

    .page-btn {
      height: 34px;
      min-width: 34px;
      padding: 0 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
      white-space: nowrap;
    }

    .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    .page-ellipsis {
      color: var(--muted);
      font-size: 0.8rem;
      padding: 0 4px;
      line-height: 34px;
    }

    /* ── Skeleton loading cards ──────────────────────────────────────────── */
    .skeleton-card {
      width: 150px;
      height: 300px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: linear-gradient(90deg, var(--card) 25%, var(--surface2) 50%, var(--card) 75%);
      background-size: 400% 100%;
      animation: shimmer 1.6s ease infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }

    /* ── Empty state ─────────────────────────────────────────────────────── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-top: 80px;
      color: var(--muted);
      text-align: center;
    }

    .empty-box {
      width: 100px;
      height: 100px;
      border: 2px dashed var(--border2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-box svg { opacity: 0.3; }

    #empty-state p {
      font-size: 0.85rem;
      color: var(--text2);
      max-width: 260px;
      line-height: 1.5;
    }

    .empty-hint {
      font-size: 0.76rem !important;
      font-style: italic;
      color: var(--muted) !important;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .empty-hint svg {
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* ── Toasts ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
      max-width: 340px;
    }

    .toast-msg {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 0.8rem;
      line-height: 1.4;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideIn 0.22s ease;
      opacity: 1;
      transition: opacity 0.3s;
    }

    .toast-msg.is-error { border-left-color: var(--error); }
    .toast-msg.fade { opacity: 0; }

    .toast-icon {
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      margin-right: 7px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    @keyframes slideIn {
      from { transform: translateX(32px); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 14px 28px;
      font-size: 0.72rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    footer a:hover { color: var(--text2); }

    /* ── Responsive — tablet ─────────────────────────────────────────────── */
    @media (max-width: 860px) {
      .url-form { max-width: 100%; }

      .filter-input { width: 160px; }

      .queue-url { display: none; }
    }

    /* ── Responsive — mobile ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      /* Header wraps to two rows: logo row + form row */
      header {
        height: auto;
        flex-wrap: wrap;
        padding: 12px 16px;
        gap: 10px;
      }

      .url-form {
        flex: 0 0 100%;
        max-width: 100%;
      }

      /* Queue */
      .queue-item { padding: 10px 16px; }

      /* Main */
      main { padding: 20px 16px; }

      /* Toolbar: heading row then controls row */
      .library-toolbar { flex-wrap: wrap; row-gap: 10px; }

      .filter-wrap {
        flex: 1 1 auto;
        min-width: 0;
      }

      .filter-input { width: 100%; }

      .sort-group {
        flex: 0 0 100%;
        order: 4;
        margin-left: 0;
        overflow-x: auto;
        /* hide scrollbar visually but keep scrollable */
        scrollbar-width: none;
      }

      .sort-group::-webkit-scrollbar { display: none; }

      /* Center single-column grid on very small screens */
      #comics-grid { justify-content: center; gap: 14px; }

      /* Toasts go edge-to-edge */
      #toast {
        left: 12px;
        right: 12px;
        bottom: 12px;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <header>
    <a class="logo" href="/">
      <div class="logo-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12l7 7 7-7"/>
        </svg>
      </div>
      <span class="logo-text">YOINK<span>.</span></span>
    </a>

    <form class="url-form" id="url-form">
      <input
        class="url-input"
        id="url-input"
        type="url"
        placeholder="Paste a comic URL to download…"
        required
        autocomplete="off"
        spellcheck="false"
      />
      <button class="url-btn" id="url-btn" type="submit">Download</button>
    </form>
  </header>

  <div id="queue"></div>

  <main>
    <div class="library-toolbar">
      <span class="section-heading">Library</span>
      <span class="comic-count" id="comic-count" style="display:none"></span>
      <div class="filter-wrap">
        <span class="filter-icon">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </span>
        <input class="filter-input" id="filter-input" type="search" placeholder="Filter by title…" />
      </div>
      <div class="sort-group">
        <button class="sort-btn active" data-sort="newest">Newest</button>
        <button class="sort-btn" data-sort="oldest">Oldest</button>
        <button class="sort-btn" data-sort="az">A&ndash;Z</button>
        <button class="sort-btn" data-sort="za">Z&ndash;A</button>
      </div>
    </div>

    <div id="comics-grid"></div>
    <div id="pagination"></div>

    <div id="empty-state">
      <div class="empty-box">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
      </div>
      <p>No comics yet — paste a URL above to start building your library.</p>
      <p class="empty-hint">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5M5 12l7-7 7 7"/>
        </svg>
        Your downloaded comics will appear here
      </p>
    </div>
  </main>

  <footer>
    <a href="https://github.com/brizzbuzz/yoink-go" target="_blank" rel="noopener">Yoink</a>
    &nbsp;&middot;&nbsp; v1.1.0
  </footer>

  <div id="toast"></div>

  <script>
    // ── State ──────────────────────────────────────────────────────────────
    const PAGE_SIZE   = 48;
    let knownJobs     = {};
    let dismissedJobs = JSON.parse(localStorage.getItem('dismissedJobs') || '{}');
    let allComics     = [];
    let currentSort   = localStorage.getItem('comicSort') || 'newest';
    let currentPage   = 1;

    // ── DOM refs ───────────────────────────────────────────────────────────
    const form        = document.getElementById('url-form');
    const input       = document.getElementById('url-input');
    const btn         = document.getElementById('url-btn');
    const queue       = document.getElementById('queue');
    const grid        = document.getElementById('comics-grid');
    const emptyEl     = document.getElementById('empty-state');
    const toastEl     = document.getElementById('toast');
    const filterInput = document.getElementById('filter-input');
    const sortBtns    = document.querySelectorAll('.sort-btn');
    const countEl     = document.getElementById('comic-count');

    // ── Submit handler ─────────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = input.value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = 'Queuing…';

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url }),
        });

        if (!res.ok) throw new Error(await res.text());

        const job = await res.json();
        knownJobs[job.id] = job;
        input.value = '';
        toast('Download queued');
        renderQueue();
      } catch (err) {
        toast('Error: ' + err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Download';
      }
    });

    // ── Render queue ───────────────────────────────────────────────────────
    function renderQueue() {
      const active = Object.values(knownJobs).filter(j => !dismissedJobs[j.id]);
      queue.innerHTML = '';

      if (active.length === 0) {
        queue.classList.remove('visible');
        return;
      }

      queue.classList.add('visible');
      active.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

      active.forEach(job => {
        const row = document.createElement('div');
        row.className = 'queue-item';
        row.dataset.status = job.status;

        const bar = document.createElement('div');
        bar.className = 'queue-status-bar';

        const meta = document.createElement('div');
        meta.className = 'queue-meta';

        const title = document.createElement('div');
        title.className = 'queue-title';
        title.textContent = job.title || 'Fetching…';

        const urlEl = document.createElement('div');
        urlEl.className = 'queue-url';
        urlEl.textContent = job.url;

        meta.append(title, urlEl);

        const pill = makeStatusPill(job);

        const dismiss = document.createElement('button');
        dismiss.className = 'dismiss-btn';
        dismiss.title = 'Dismiss';
        dismiss.innerHTML = '&times;';
        dismiss.addEventListener('click', () => {
          dismissedJobs[job.id] = true;
          localStorage.setItem('dismissedJobs', JSON.stringify(dismissedJobs));
          renderQueue();
        });

        row.append(bar, meta, pill, dismiss);
        queue.append(row);
      });
    }

    function makeStatusPill(job) {
      const pill = document.createElement('span');
      pill.className = 'status-pill ' + job.status;

      if (job.status === 'pending' || job.status === 'running') {
        const spin = document.createElement('span');
        spin.className = 'spinner';
        pill.append(spin);
      }

      const label = {
        pending:  'Pending',
        running:  'Downloading',
        complete: '✓ Done',
        error:    '✕ Error',
      }[job.status] || job.status;

      pill.append(document.createTextNode(label));
      if (job.error) pill.title = job.error;

      return pill;
    }

    // ── Filter & sort ──────────────────────────────────────────────────────
    function applyFilterAndSort(resetPage = false) {
      const query = filterInput.value.trim().toLowerCase();

      let comics = query
        ? allComics.filter(c => c.title.toLowerCase().includes(query))
        : allComics.slice();

      if (currentSort === 'oldest') {
        comics = comics.slice().reverse();
      } else if (currentSort === 'az') {
        comics = comics.slice().sort((a, b) => a.title.localeCompare(b.title));
      } else if (currentSort === 'za') {
        comics = comics.slice().sort((a, b) => b.title.localeCompare(a.title));
      }

      const totalPages = Math.max(1, Math.ceil(comics.length / PAGE_SIZE));
      if (resetPage || currentPage > totalPages) currentPage = 1;

      const paged = comics.slice((currentPage - 1) * PAGE_SIZE, currentPage * PAGE_SIZE);
      renderComics(paged);
      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const el = document.getElementById('pagination');
      el.innerHTML = '';
      if (totalPages <= 1) return;

      const mkBtn = (label, page, active = false, disabled = false) => {
        const b = document.createElement('button');
        b.className = 'page-btn' + (active ? ' active' : '');
        b.textContent = label;
        b.disabled = disabled;
        b.addEventListener('click', () => {
          currentPage = page;
          applyFilterAndSort();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        return b;
      };

      const mkEllipsis = () => {
        const s = document.createElement('span');
        s.className = 'page-ellipsis';
        s.textContent = '…';
        return s;
      };

      el.append(mkBtn('← Prev', currentPage - 1, false, currentPage === 1));

      // Page numbers with ellipsis: always show first, last, and window around current
      const pages = new Set([1, totalPages]);
      for (let p = currentPage - 2; p <= currentPage + 2; p++) {
        if (p > 1 && p < totalPages) pages.add(p);
      }
      const sorted = [...pages].sort((a, b) => a - b);

      let prev = 0;
      for (const p of sorted) {
        if (p - prev > 1) el.append(mkEllipsis());
        el.append(mkBtn(p, p, p === currentPage));
        prev = p;
      }

      el.append(mkBtn('Next →', currentPage + 1, false, currentPage === totalPages));
    }

    // ── Render comics ──────────────────────────────────────────────────────
    function renderComics(comics) {
      grid.innerHTML = '';

      if (!comics || comics.length === 0) {
        emptyEl.style.display = 'flex';
        countEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      countEl.textContent = allComics.length;
      countEl.style.display = '';

      comics.forEach(comic => {
        const a = document.createElement('a');
        a.className = 'comic-card';
        a.href = comic.file_url;

        if (comic.cover_url) {
          const img = document.createElement('img');
          img.className = 'comic-cover';
          img.src = comic.cover_url;
          img.alt = comic.title;
          img.loading = 'lazy';
          img.onerror = () => img.replaceWith(makePlaceholder(comic.title));
          a.append(img);
        } else {
          a.append(makePlaceholder(comic.title));
        }

        const overlay = document.createElement('div');
        overlay.className = 'comic-download-overlay';
        overlay.innerHTML = `<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3v13M5 14l7 7 7-7"/><path d="M3 21h18"/>
        </svg>`;
        a.append(overlay);

        const info = document.createElement('div');
        info.className = 'comic-info';

        const title = document.createElement('div');
        title.className = 'comic-title';
        title.textContent = comic.title;

        info.append(title);
        a.append(info);
        grid.append(a);
      });
    }

    function makePlaceholder(title) {
      const div = document.createElement('div');
      div.className = 'comic-cover-placeholder';
      if (title) {
        const words = title.trim().split(/\s+/).filter(Boolean);
        const initials = words.length === 1
          ? words[0].slice(0, 2)
          : (words[0][0] + words[1][0]);
        const span = document.createElement('span');
        span.className = 'placeholder-initials';
        span.textContent = initials.toUpperCase();
        div.append(span);
      } else {
        div.innerHTML = `
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="1.2">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>`;
      }
      return div;
    }

    function showSkeletons() {
      grid.innerHTML = '';
      emptyEl.style.display = 'none';
      for (let i = 0; i < 10; i++) {
        const sk = document.createElement('div');
        sk.className = 'skeleton-card';
        grid.append(sk);
      }
    }

    // ── Toast ──────────────────────────────────────────────────────────────
    function toast(msg, isError = false) {
      const el = document.createElement('div');
      el.className = 'toast-msg' + (isError ? ' is-error' : '');

      const icon = document.createElement('span');
      icon.className = 'toast-icon';
      if (isError) {
        icon.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/>
        </svg>`;
      } else {
        icon.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><path d="M8 12l3 3 5-5"/>
        </svg>`;
      }

      el.append(icon, document.createTextNode(msg));
      toastEl.append(el);
      setTimeout(() => {
        el.classList.add('fade');
        setTimeout(() => el.remove(), 350);
      }, 3500);
    }

    // ── Polling ────────────────────────────────────────────────────────────
    async function pollJobs() {
      try {
        const res = await fetch('/api/jobs');
        const jobs = await res.json();
        let needComicRefresh = false;

        jobs.forEach(job => {
          const prev = knownJobs[job.id];
          if (prev && prev.status !== 'complete' && job.status === 'complete') {
            needComicRefresh = true;
            toast(`"${job.title}" downloaded`);
          }
          if (prev && prev.status !== 'error' && job.status === 'error') {
            toast(`Failed: ${job.title || job.url}${job.error ? ' — ' + job.error : ''}`, true);
          }
          knownJobs[job.id] = job;
        });

        renderQueue();
        if (needComicRefresh) await fetchComics();
      } catch (_) {}
    }

    async function fetchComics() {
      try {
        const res = await fetch('/api/comics');
        allComics = await res.json();
        applyFilterAndSort();
      } catch (_) {}
    }

    // ── Init ───────────────────────────────────────────────────────────────
    sortBtns.forEach(b => {
      if (b.dataset.sort === currentSort) b.classList.add('active');
      else b.classList.remove('active');

      b.addEventListener('click', () => {
        currentSort = b.dataset.sort;
        localStorage.setItem('comicSort', currentSort);
        sortBtns.forEach(x => x.classList.toggle('active', x === b));
        applyFilterAndSort(true);
      });
    });

    filterInput.addEventListener('input', () => applyFilterAndSort(true));

    showSkeletons();
    fetchComics();
    setInterval(pollJobs, 2000);
    setInterval(fetchComics, 10000);
  </script>
</body>
</html>
