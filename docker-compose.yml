services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped

  yoink:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./library:/library
    environment:
      - YOINK_LIBRARY=/library
      - FLARESOLVERR_URL=http://flaresolverr:8191
    restart: unless-stopped
    depends_on:
      - flaresolverr
